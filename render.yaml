services:
  - type: web
    name: shria-ecommerce
    env: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client && npm --prefix client run build
    startCommand: npm --prefix server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
